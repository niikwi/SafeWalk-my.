<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeWalk MY | Community Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-blue-600 text-white p-5 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fas fa-shield-halved"></i> SafeWalk MY
        </h1>
        <div class="bg-blue-500 px-3 py-1 rounded-full text-xs font-mono">GPS: ACTIVE</div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <div class="relative w-full h-80 bg-blue-100 rounded-3xl overflow-hidden border-4 border-white shadow-xl mb-6">
            <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            
            <svg class="absolute inset-0 w-full h-full">
                <path d="M 50 250 Q 150 150 250 200 T 350 50" stroke="#10b981" stroke-width="8" fill="transparent" stroke-linecap="round" />
            </svg>

            <div class="absolute bottom-[20%] left-[10%]">
                <div class="w-6 h-6 bg-blue-500 rounded-full border-4 border-white shadow-lg animate-ping"></div>
                <div class="w-6 h-6 bg-blue-600 rounded-full border-4 border-white absolute top-0"></div>
            </div>

            <div class="absolute top-4 left-4 bg-white/90 p-2 rounded-lg shadow text-[10px] font-bold text-blue-800">
                AI DETECTING STREET LIGHTS...
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <label class="text-xs font-black text-slate-400 uppercase">Destination</label>
                <input type="text" id="dest" placeholder="Enter school or home address..." 
                    class="w-full mt-1 font-semibold text-slate-800 focus:outline-none">
            </div>

            <button onclick="startSafeWalk()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                GENERATE SAFE ROUTE
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6">
            <button class="bg-red-50 p-4 rounded-2xl border border-red-100 text-center">
                <i class="fas fa-bullhorn text-red-600 text-xl mb-1"></i>
                <p class="text-[10px] font-bold text-red-600 uppercase">Panic Alarm</p>
            </button>
            <button class="bg-green-50 p-4 rounded-2xl border border-green-100 text-center">
                <i class="fas fa-share-nodes text-green-600 text-xl mb-1"></i>
                <p class="text-[10px] font-bold text-green-600 uppercase">Live Location</p>
            </button>
        </div>
    </main>

    <script>
        function startSafeWalk() {
            const dest = document.getElementById('dest').value;
            if(!dest) return alert("Please enter where you are going!");
            alert("AI analyzing Jalan Hospital and nearby routes for lighting and activity...");
        }
    </script>
</body>
</html>
